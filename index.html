<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validando Acesso</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src='//libtl.com/sdk.js' data-zone='11281924' data-sdk='show_11281924'></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0e1621;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background-color: #2481cc;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Validando seu acesso...</h2>
    <p>Por favor, assista ao anúncio para liberar sua consulta.</p>
    
    <div id="status">Aguarde o anúncio carregar...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Tenta mostrar o anúncio assim que carregar
        window.onload = function() {
            if (typeof show_11281924 === 'function') {
                show_11281924('pop').then(() => {
                    document.getElementById('status').innerText = "✅ Anúncio visualizado!";
                    tg.MainButton.setText("CONCLUIR E VOLTAR");
                    tg.MainButton.show();
                    tg.MainButton.onClick(() => {
                        tg.close();
                    });
                }).catch(e => {
                    document.getElementById('status').innerText = "Erro ao carregar anúncio. Tente novamente.";
                    console.error(e);
                });
            }
        };
    </script>
</body>
</html>
